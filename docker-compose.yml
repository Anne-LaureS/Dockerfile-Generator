version: "3.9"

services:
  app:
    build: .
    container_name: python-app
    expose:
      - "80"
    networks:
      - appnet

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"

    # --- MODE 1 : Reverse Proxy vers l'application Python ---
    Activer ce mode en décommentant la ligne suivante :
    volumes:
       - ./nginx.conf:/etc/nginx/nginx.conf:ro

    # --- MODE 2 : Serveur statique (index.html) ---
    # Activer ce mode en décommentant la ligne suivante :
    # volumes:
    #   - ./html:/usr/share/nginx/html:ro

    depends_on:
      - app
    networks:
      - appnet

  redis:
    image: redis:latest
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - appnet

networks:
  appnet:
